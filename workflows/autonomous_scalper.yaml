# Autonomous Scalper Workflow - Agentic Inference Version
version: "1.0"

workflow:
  id: autonomous-scalper-v1
  name: Autonomous Scalper Agent
  description: Scans, reasons via LLM, and executes trades autonomously
  version: "1.1.0"
  tenant_id: alpha-trader
  required_tiers: [T0, T1, T2, T3, T4]
  success_criteria: High-grade setups identified via inference and executed
  failure_modes:
    - execution_failed: Log and skip
    - reasoning_failed: Log and skip
  phases_used: [Observe, Think, Plan, Execute, Verify]

  nodes:
    - id: fetch-spy-data
      name: Fetch SPY Data
      phase: Observe
      skill_id: fetch_ohlcv
      description: Get 1h OHLCV for SPY
      inputs: []
      outputs: [ohlcv_data]
      parameters: { symbol: "SPY", timeframe: "1h", limit: 50 }

    - id: calc-spy-profile
      name: Calculate SPY Volume Profile
      phase: Observe
      skill_id: calculate_profile_for_symbol
      description: Calculate POC, FVA for SPY
      inputs: [ohlcv_data]
      outputs: [volume_profile]
      parameters: { symbol: "SPY" }

    - id: calc-spy-technicals
      name: Calculate SPY Technicals
      phase: Observe
      skill_id: calculate_technicals
      description: SMA, RSI, MACD for SPY
      inputs: [ohlcv_data]
      outputs: [technicals]

    - id: calc-spy-order-flow
      name: Analyze SPY Order Flow
      phase: Observe
      skill_id: get_order_flow_signals
      description: Analyze CVD and Delta for SPY
      inputs: [ohlcv_data]
      outputs: [order_flow]

    - id: check-pdt
      name: Check PDT Status
      phase: Observe
      skill_id: check_pdt_compliance
      description: Verify real-time PDT limits on Schwab
      inputs: []
      outputs: [pdt_status]
      tools: [check_pdt_compliance]

    - id: brain-inference
      name: Brain Reasoning
      phase: Think
      skill_id: reason_about_setup
      description: Synthesize all data into a trading thesis using LLM
      inputs: [ohlcv_data, volume_profile, order_flow, technicals, pdt_status]
      outputs: [brain_decision]
      tools: [reason_about_setup]
      parameters: { symbol: "SPY" }

    - id: deep-research
      name: Deep Research Critique
      phase: Think
      skill_id: deep_research_critique
      description: Red Team the initial thesis to find hidden risks
      inputs: [brain_decision, ohlcv_data, technicals]
      outputs: [critique_result]
      tools: [deep_research_critique]
      parameters: { symbol: "SPY" }

    - id: select-trade
      name: Filter Decision
      phase: Plan
      skill_id: select_best_trade
      description: Verify score > 75 and Critique Rating > 7
      inputs: [brain_decision, critique_result, pdt_status]
      outputs: [selected_trade]
      tools: [strategy_filter]

    - id: execute-trade
      name: Execute Option Trade
      phase: Execute
      skill_id: submit_trade
      description: Place option order on Schwab
      inputs: [selected_trade]
      outputs: [execution_result]
      tools: [submit_trade]

    - id: log-and-reflect
      name: Log and Reflect
      phase: Verify
      skill_id: log_execution
      description: Record action and prepare for post-mortem
      inputs: [brain_decision, execution_result]
      outputs: [agent_log]
      tools: [log_execution]

  edges:
    - { from: fetch-spy-data, to: calc-spy-profile }
    - { from: calc-spy-profile, to: calc-spy-technicals }
    - { from: calc-spy-technicals, to: calc-spy-order-flow }
    - { from: calc-spy-order-flow, to: check-pdt }
    - { from: check-pdt, to: brain-inference }
    - { from: brain-inference, to: deep-research }
    - { from: deep-research, to: select-trade }
    - { from: select-trade, to: execute-trade, condition: "selected_trade != null" }
    - { from: execute-trade, to: log-and-reflect }
    - { from: select-trade, to: log-and-reflect, condition: "selected_trade == null" }