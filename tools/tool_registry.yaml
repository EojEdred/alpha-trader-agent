# Alpha Trader Tool Registry
version: "1.0"
tenant_id: alpha-trader

tools:
  # MARKET DATA (T1-T2)
  - id: fetch_options_chain
    name: Fetch Options Chain
    tier: T2
    category: market_data
    provider: interactive_brokers
    rate_limit: { requests_per_minute: 30 }
    parameters:
      - { name: symbol, type: string, required: true }
      - { name: expiration_range_days, type: integer, default: 60 }
    implementation:
      standalone: tools.market_data::fetch_options_chain

  - id: fetch_futures_data
    name: Fetch Futures Data
    tier: T2
    category: market_data
    provider: ninjatrader
    rate_limit: { requests_per_minute: 60 }
    parameters:
      - { name: contract, type: string, required: true }
    implementation:
      standalone: tools.market_data::fetch_futures_data

  - id: fetch_crypto_data
    name: Fetch Cryptocurrency Data
    tier: T1
    category: market_data
    provider: ccxt
    rate_limit: { requests_per_minute: 1200 }
    parameters:
      - { name: exchange, type: string, required: true }
      - { name: symbol, type: string, required: true }
      - { name: timeframe, type: string, default: "1h" }
    implementation:
      standalone: tools.market_data::fetch_crypto_data

  - id: fetch_polymarket
    name: Fetch Polymarket Data
    tier: T1
    category: market_data
    provider: polymarket
    rate_limit: { requests_per_minute: 100 }
    parameters:
      - { name: market_id, type: string, required: false }
      - { name: active_only, type: boolean, default: true }
    implementation:
      standalone: tools.market_data::fetch_polymarket

  - id: fetch_news
    name: Fetch News
    tier: T1
    category: market_data
    provider: newsapi
    rate_limit: { requests_per_day: 100 }
    parameters:
      - { name: symbols, type: array, required: false }
      - { name: hours_back, type: integer, default: 24 }
    implementation:
      standalone: tools.market_data::fetch_news

  # ANALYSIS (T0-T1)
  - id: calculate_technicals
    name: Calculate Technical Indicators
    tier: T0
    category: analysis
    provider: local
    stateless: true
    parameters:
      - { name: ohlcv_data, type: array, required: true }
      - { name: indicators, type: array, default: ["sma_20", "rsi_14", "macd"] }
    implementation:
      standalone: tools.analysis::calculate_technicals

  - id: analyze_options_greeks
    name: Analyze Options Greeks
    tier: T0
    category: analysis
    provider: local
    stateless: true
    parameters:
      - { name: options_chain, type: object, required: true }
    implementation:
      standalone: tools.analysis::analyze_options_greeks

  - id: evaluate_sentiment
    name: Evaluate Sentiment
    tier: T1
    category: analysis
    provider: llm
    parameters:
      - { name: texts, type: array, required: true }
    implementation:
      standalone: tools.analysis::evaluate_sentiment

  - id: detect_patterns
    name: Detect Chart Patterns
    tier: T0
    category: analysis
    provider: local
    stateless: true
    parameters:
      - { name: ohlcv_data, type: array, required: true }
    implementation:
      standalone: tools.analysis::detect_patterns

  - id: map_session_liquidity
    name: Map Session Liquidity
    tier: T0
    category: analysis
    provider: local
    stateless: true
    parameters:
      - { name: ohlcv_data, type: array, required: true }
    implementation:
      standalone: tools.analysis::map_session_liquidity

  # STRATEGY (T1-T2)
  - id: generate_trade_idea
    name: Generate Trade Idea
    tier: T1
    category: strategy
    provider: llm
    parameters:
      - { name: signals, type: object, required: true }
      - { name: risk_params, type: object, required: true }
    implementation:
      standalone: tools.strategy::generate_trade_idea

  - id: calculate_position_size
    name: Calculate Position Size
    tier: T0
    category: strategy
    provider: local
    stateless: true
    parameters:
      - { name: account_value, type: number, required: true }
      - { name: risk_per_trade_pct, type: number, default: 1.0 }
      - { name: stop_distance, type: number, required: true }
    implementation:
      standalone: tools.strategy::calculate_position_size

  - id: evaluate_portfolio_risk
    name: Evaluate Portfolio Risk
    tier: T1
    category: strategy
    provider: local
    parameters:
      - { name: positions, type: array, required: true }
      - { name: proposed_trade, type: object, required: false }
    implementation:
      standalone: tools.strategy::evaluate_portfolio_risk

  # EXECUTION (T3-T4)
  - id: submit_order
    name: Submit Order
    tier: T3
    category: execution
    provider: interactive_brokers
    requires_confirmation: true
    parameters:
      - { name: symbol, type: string, required: true }
      - { name: side, type: string, enum: [buy, sell], required: true }
      - { name: quantity, type: integer, required: true }
      - { name: order_type, type: string, default: limit }
      - { name: limit_price, type: number, required: false }
    implementation:
      standalone: tools.execution::submit_order

  - id: modify_order
    name: Modify Order
    tier: T3
    category: execution
    provider: interactive_brokers
    parameters:
      - { name: order_id, type: string, required: true }
      - { name: new_limit_price, type: number, required: false }
    implementation:
      standalone: tools.execution::modify_order

  - id: cancel_order
    name: Cancel Order
    tier: T3
    category: execution
    provider: interactive_brokers
    parameters:
      - { name: order_id, type: string, required: true }
    implementation:
      standalone: tools.execution::cancel_order

  - id: emergency_close
    name: Emergency Position Close
    tier: T4
    category: execution
    provider: interactive_brokers
    requires_confirmation: false
    circuit_breaker: true
    parameters:
      - { name: symbol, type: string, required: true }
      - { name: reason, type: string, required: true }
    implementation:
      standalone: tools.execution::emergency_close

  - id: get_positions
    name: Get Positions
    tier: T2
    category: execution
    provider: interactive_brokers
    parameters: []
    implementation:
      standalone: tools.execution::get_positions

  - id: get_order_status
    name: Get Order Status
    tier: T2
    category: execution
    provider: interactive_brokers
    parameters:
      - { name: order_id, type: string, required: true }
    implementation:
      standalone: tools.execution::get_order_status

  # REPORTING (T0-T1)
  - id: generate_report
    name: Generate Report
    tier: T0
    category: reporting
    provider: local
    parameters:
      - { name: report_data, type: object, required: true }
      - { name: format, type: string, default: markdown }
