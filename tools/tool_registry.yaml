    stateless: true
    parameters:
      - { name: positions, type: array, required: true }
      - { name: current_prices, type: object, required: true }
    implementation:
      standalone: tools.reporting::calculate_pnl

  # DELIVERY (T1)
  - id: send_email
    name: Send Email
    tier: T1
    category: delivery
    provider: smtp
    rate_limit: { requests_per_hour: 50 }
    parameters:
      - { name: to, type: string, required: true }
      - { name: subject, type: string, required: true }
      - { name: body, type: string, required: true }
    implementation:
      standalone: tools.delivery::send_email

  - id: send_sms
    name: Send SMS
    tier: T1
    category: delivery
    provider: twilio
    rate_limit: { requests_per_minute: 10 }
    parameters:
      - { name: to, type: string, required: true }
      - { name: message, type: string, required: true }
    implementation:
      standalone: tools.delivery::send_sms

  - id: send_telegram
    name: Send Telegram Message
    tier: T1
    category: delivery
    provider: telegram
    parameters:
      - { name: message, type: string, required: true }
    implementation:
      standalone: tools.delivery::send_telegram

  - id: send_alert
